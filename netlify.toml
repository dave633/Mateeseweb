# Netlify configurations for Matescz_ Website

[build]
  publish = "."
  functions = "netlify/functions"

[build.processing]
  [build.processing.css]
    bundle = true
    minify = true
  [build.processing.js]
    bundle = true
    minify = true
  [build.processing.html]
    pretty_urls = true
  [build.processing.images]
    compress = true
