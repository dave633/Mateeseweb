<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matescz_ | Hra - Neon Snake</title>
    <link rel="icon" href="https://mc-heads.net/avatar/Matescz_/100" type="image/png">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        #game-container {
            position: relative;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #10b981;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.2);
            overflow: hidden;
            margin-top: 2rem;
            width: 600px;
            height: 600px;
        }

        canvas {
            display: block;
        }

        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.82);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            z-index: 10;
        }

        .game-overlay h2 {
            font-size: 3rem;
            color: #10b981;
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
            margin-bottom: 1rem;
        }

        .play-btn {
            background: #10b981;
            color: #000;
            border: none;
            padding: 1rem 3rem;
            font-size: 1.2rem;
            font-weight: 900;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Orbitron', sans-serif;
            margin-top: 1rem;
        }

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        .stats {
            position: absolute;
            top: 20px;
            left: 20px;
            font-family: 'Orbitron', sans-serif;
            color: #10b981;
            z-index: 5;
            pointer-events: none;
        }
    </style>
</head>

<body class="links-page">

    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html">
                <img src="https://mc-heads.net/avatar/Matescz_/100" alt="Logo" class="nav-logo-img">
            </a>
        </div>
        <div class="nav-center">
            <a href="about.html" class="nav-item">👤 O mně</a>
            <a href="links.html" class="nav-item">🔗 Odkazy</a>
            <a href="games.html" class="nav-item active">🎮 Hry</a>
            <a href="programovani.html" class="nav-item">💻 Kód</a>
            <a href="galerie.html" class="nav-item">📸 Galerie</a>
            <a href="servery.html" class="nav-item">🌍 Servery</a>
            <a href="faq.html" class="nav-item">❓ FAQ</a>
            <a href="tickets.html" class="nav-item">🎫 Tickety</a>
        </div>
        <div class="nav-right">
            <a href="#" class="nav-item login-trigger">🔑 Login</a>
            <a href="kontakt.html" class="nav-item">✉️ Kontakt</a>
        </div>
    </nav>

    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>

    <main class="links-container" style="display: flex; flex-direction: column; align-items: center; padding-top: 100px;">
        <div class="links-header fade-in floating" style="margin-bottom: 0rem;">
            <h1><span class="social-gradient-text" style="background: linear-gradient(90deg, #10b981, #34d399);">NEON SNAKE</span></h1>
        </div>

        <div id="game-container" class="fade-in" style="transition-delay: 0.3s;">
            <div class="stats">SCORE: <span id="score">0</span> | BEST: <span id="high-score">0</span></div>
            
            <div id="start-overlay" class="game-overlay">
                <h2>READY?</h2>
                <p>Použij šipky nebo WASD</p>
                <button class="play-btn" onclick="startGame()">START</button>
            </div>

            <div id="game-over-overlay" class="game-overlay" style="display: none;">
                <h2>KONEC HRY</h2>
                <p id="final-score">Skóre: 0</p>
                <button class="play-btn" onclick="startGame()">HRÁT ZNOVU</button>
            </div>

            <canvas id="gameCanvas" width="600" height="600"></canvas>
        </div>

        <div class="fade-in" style="margin-top: 3rem; text-align: center; transition-delay: 0.5s;">
            <a href="games.html" class="nav-brand" style="display: inline-flex; text-decoration: none;">
                <span style="font-family: 'Orbitron', sans-serif;">ZPĚT DO MENU</span>
            </a>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('high-score');
        const finalScoreEl = document.getElementById('final-score');
        const startOverlay = document.getElementById('start-overlay');
        const gameOverOverlay = document.getElementById('game-over-overlay');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake, food, dx, dy, score, gameRunning = false, speed = 100;
        let highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
        highScoreEl.innerText = highScore;

        function initGame() {
            snake = [{ x: 10, y: 10 }];
            food = { x: 5, y: 5 };
            dx = 0;
            dy = 0;
            score = 0;
            scoreEl.innerText = score;
            gameRunning = true;
            placeFood();
        }

        function placeFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            // Don't place food on snake
            for (let part of snake) {
                if (part.x === food.x && part.y === food.y) return placeFood();
            }
        }

        document.addEventListener('keydown', changeDirection);

        function changeDirection(event) {
            const keyPressed = event.keyCode;
            const LEFT = 37, UP = 38, RIGHT = 39, DOWN = 40;
            const A = 65, W = 87, D = 68, S = 83;

            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if ((keyPressed === LEFT || keyPressed === A) && !goingRight) { dx = -1; dy = 0; }
            if ((keyPressed === UP || keyPressed === W) && !goingDown) { dx = 0; dy = -1; }
            if ((keyPressed === RIGHT || keyPressed === D) && !goingLeft) { dx = 1; dy = 0; }
            if ((keyPressed === DOWN || keyPressed === S) && !goingUp) { dx = 0; dy = 1; }
        }

        function drawGame() {
            if (!gameRunning) return;

            setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                advanceSnake();
                drawSnake();
                drawGame();
            }, speed);
        }

        function clearCanvas() {
            ctx.fillStyle = "rgba(0, 0, 0, 1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? "#10b981" : "#34d399";
                ctx.shadowBlur = index === 0 ? 15 : 5;
                ctx.shadowColor = "#10b981";
                ctx.fillRect(part.x * gridSize + 1, part.y * gridSize + 1, gridSize - 2, gridSize - 2);
            });
            ctx.shadowBlur = 0;
        }

        function advanceSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Check walls
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                return gameOver();
            }

            // Check self collision (only if moving)
            if (dx !== 0 || dy !== 0) {
                for (let i = 0; i < snake.length; i++) {
                    if (head.x === snake[i].x && head.y === snake[i].y) return gameOver();
                }
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.innerText = score;
                if (score > highScore) {
                    highScore = score;
                    highScoreEl.innerText = highScore;
                    localStorage.setItem('snakeHighScore', highScore);
                }
                placeFood();
            } else {
                snake.pop();
            }
        }

        function drawFood() {
            ctx.fillStyle = "#fff";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#10b981";
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize / 2, food.y * gridSize + gridSize / 2, gridSize / 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function gameOver() {
            gameRunning = false;
            finalScoreEl.innerText = "Skóre: " + score;
            gameOverOverlay.style.display = 'flex';
        }

        function startGame() {
            startOverlay.style.display = 'none';
            gameOverOverlay.style.display = 'none';
            initGame();
            drawGame();
        }
    </script>
</body>

</html>
