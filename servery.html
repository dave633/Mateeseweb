    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        .server-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(236, 72, 153, 0.2);
            border-radius: 30px;
            padding: 3rem;
            width: 100%;
            max-width: 800px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            backdrop-filter: blur(10px);
        }

        .server-card:hover {
            border-color: #ec4899;
            box-shadow: 0 0 50px rgba(236, 72, 153, 0.15);
            transform: translateY(-5px);
        }

        .server-status-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            padding: 8px 20px;
            border-radius: 50px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 2rem;
        }

        .status-dot-pulse {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .ip-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 2rem;
            border-radius: 15px;
            display: inline-flex;
            align-items: center;
            gap: 20px;
            margin: 2rem 0;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .ip-box:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #ec4899;
        }

        .copy-hint {
            color: #ec4899;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .server-info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 3rem;
        }

        .info-stat {
            background: rgba(255, 255, 255, 0.03);
            padding: 1.5rem;
            border-radius: 20px;
        }

        .info-stat span {
            display: block;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .info-stat strong {
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
        }

        /* Nav Colors Override */
        .nav-item.active { color: #ec4899 !important; text-shadow: 0 0 15px rgba(236, 72, 153, 0.5) !important; }
    </style>
</head>

    <script>
        function copyIP() {
            const ip = "xelorialand.cz";
            navigator.clipboard.writeText(ip);
            
            const hint = document.getElementById('copy-status');
            const original = hint.innerText;
            
            hint.innerText = "IP ZKOPÍROVÁNA!";
            hint.style.color = "#10b981";
            
            setTimeout(() => {
                hint.innerText = original;
                hint.style.color = "#ec4899";
            }, 2000);
        }
    </script>
